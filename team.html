    <button
      id="to-top-button"
      onclick="goToTop()"
      title="Go To Top"
      class="hidden fixed z-90 bottom-8 right-8 border-0 w-16 h-16 rounded-full drop-shadow-md bg-blue-900 text-white text-2xl font-bold"
    >
      &uarr;
    </button>

    <footer class="p-4 bg-white md:px-6 md:py-2 text-center">
      <hr class="border-gray-400 m-4" />
      <span class="block my-2 text-sm text-gray-500 sm:text-center"
        >Designed and developed by
        <a href="#" class="hover:underline text-gray-700">SAC Web Team</a>
      </span>
    </footer>

    <script>
      // bottom to top button
      var toTopButton = document.getElementById("to-top-button");
      window.onscroll = function () {
        if (
          document.body.scrollTop > 200 ||
          document.documentElement.scrollTop > 200
        ) {
          toTopButton.classList.remove("hidden");
        } else {
          toTopButton.classList.add("hidden");
        }
      };
      function goToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    </script>
